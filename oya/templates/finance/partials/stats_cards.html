<div class="row g-3 mb-4">
  <div class="col-6 col-lg-3">
    <div class="card border-0 shadow-sm h-100 p-3">
      <div class="d-flex align-items-center gap-3">
        <div class="rounded-3 bg-primary bg-opacity-10 text-primary d-flex align-items-center justify-content-center" style="width:48px;height:48px;">
          <i class="bi bi-wallet2 fs-5"></i>
        </div>
        <div>
          <div class="text-muted small text-uppercase" style="font-size:.75rem;letter-spacing:.5px;">Treasury Balance</div>
          <div class="fw-bold fs-5">&#8358;{{ treasury_balance|floatformat:0|intcomma }}</div>
        </div>
      </div>
    </div>
  </div>
  <div class="col-6 col-lg-3">
    <div class="card border-0 shadow-sm h-100 p-3">
      <div class="d-flex align-items-center gap-3">
        <div class="rounded-3 bg-success bg-opacity-10 text-success d-flex align-items-center justify-content-center" style="width:48px;height:48px;">
          <i class="bi bi-arrow-down-circle fs-5"></i>
        </div>
        <div>
          <div class="text-muted small text-uppercase" style="font-size:.75rem;letter-spacing:.5px;">Total Income</div>
          <div class="fw-bold fs-5">&#8358;{{ total_income|floatformat:0|intcomma }}</div>
        </div>
      </div>
    </div>
  </div>
  <div class="col-6 col-lg-3">
    <div class="card border-0 shadow-sm h-100 p-3">
      <div class="d-flex align-items-center gap-3">
        <div class="rounded-3 bg-danger bg-opacity-10 text-danger d-flex align-items-center justify-content-center" style="width:48px;height:48px;">
          <i class="bi bi-arrow-up-circle fs-5"></i>
        </div>
        <div>
          <div class="text-muted small text-uppercase" style="font-size:.75rem;letter-spacing:.5px;">Total Expenses</div>
          <div class="fw-bold fs-5">&#8358;{{ total_expenses|floatformat:0|intcomma }}</div>
        </div>
      </div>
    </div>
  </div>
  <div class="col-6 col-lg-3">
    <div class="card border-0 shadow-sm h-100 p-3">
      <div class="d-flex align-items-center gap-3">
        <div class="rounded-3 bg-info bg-opacity-10 text-info d-flex align-items-center justify-content-center" style="width:48px;height:48px;">
          <i class="bi bi-people fs-5"></i>
        </div>
        <div>
          <div class="text-muted small text-uppercase" style="font-size:.75rem;letter-spacing:.5px;">Active Members</div>
          <div class="fw-bold fs-5">{{ active_members|intcomma }}</div>
        </div>
      </div>
    </div>
  </div>
</div>
