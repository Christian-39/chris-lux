<div class="modal fade" id="{{ modal_id|default:'confirmModal' }}" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold">{{ modal_title|default:'Confirm Action' }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="mb-0">{{ modal_body|default:'Are you sure you want to proceed?' }}</p>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" id="{{ modal_confirm_id|default:'confirmBtn' }}">{{ modal_confirm_text|default:'Confirm' }}</button>
      </div>
    </div>
  </div>
</div>
