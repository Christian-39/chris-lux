{% extends 'base.html' %}
{% load static %}

{% block title %}Page Not Found - {{ site_settings.site_name }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 text-center">
            <div class="py-5">
                <i class="fas fa-search fa-5x text-muted mb-4"></i>
                <h1 class="display-1 fw-bold text-primary">404</h1>
                <h2 class="mb-3">Page Not Found</h2>
                <p class="text-muted mb-4">Sorry, the page you're looking for doesn't exist or has been moved.</p>
                <div class="d-flex justify-content-center gap-2">
                    <a href="{% url 'core:home' %}" class="btn btn-primary">
                        <i class="fas fa-home me-2"></i>Go Home
                    </a>
                    <a href="{% url 'products:product_list' %}" class="btn btn-outline-primary">
                        <i class="fas fa-shopping-bag me-2"></i>Shop Now
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
