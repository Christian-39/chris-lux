{% extends 'base.html' %}
{% load static %}

{% block title %}New Message - {{ site_settings.site_name }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-lg-3 mb-4">
            {% include 'accounts/includes/sidebar.html' %}
        </div>
        
        <!-- Main Content -->
        <div class="col-lg-9">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0"><i class="fas fa-envelope me-2"></i>Start a New Conversation</h5>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="id_subject" class="form-label">Subject *</label>
                            <select name="subject" class="form-select" required>
                                <option value="general">General Inquiry</option>
                                <option value="order">Order Related</option>
                                <option value="payment">Payment Issue</option>
                                <option value="product">Product Question</option>
                                <option value="shipping">Shipping/Delivery</option>
                                <option value="return">Return/Refund</option>
                                <option value="technical">Technical Support</option>
                                <option value="complaint">Complaint</option>
                                <option value="feedback">Feedback</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_custom_subject" class="form-label">Custom Subject (if Other)</label>
                            <input type="text" name="custom_subject" class="form-control" placeholder="Specify your subject">
                        </div>
                        
                        {% if orders %}
                        <div class="mb-3">
                            <label for="id_order_id" class="form-label">Related Order (Optional)</label>
                            <select name="order_id" class="form-select">
                                <option value="">Select an order</option>
                                {% for order in orders %}
                                <option value="{{ order.id }}">#{{ order.order_number }} - {{ order.created_at|date:"M d, Y" }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        {% endif %}
                        
                        <div class="mb-4">
                            <label for="id_message" class="form-label">Message *</label>
                            <textarea name="message" class="form-control" rows="5" required placeholder="Describe your issue or question in detail..."></textarea>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-paper-plane me-2"></i>Send Message
                            </button>
                            <a href="{% url 'messaging:conversations' %}" class="btn btn-outline-secondary">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
