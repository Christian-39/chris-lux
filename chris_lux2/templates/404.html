{% extends 'base.html' %}

{% block title %}Page Not Found - {{ site_settings.site_name|default:"Chris-Lux" }}{% endblock %}

{% block content %}
<section class="section" style="min-height: calc(100vh - 300px); display: flex; align-items: center;">
    <div class="container" style="text-align: center;">
        <div style="font-size: 8rem; font-weight: 700; color: var(--primary); line-height: 1;">404</div>
        <h1 style="font-size: 2rem; margin-bottom: 1rem;">Page Not Found</h1>
        <p style="color: var(--gray-600); margin-bottom: 2rem;">The page you're looking for doesn't exist or has been moved.</p>
        <a href="{% url 'core:home' %}" class="btn btn-primary btn-lg">
            <i class="fas fa-home"></i> Back to Home
        </a>
    </div>
</section>
{% endblock %}
