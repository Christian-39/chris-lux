<!-- Search Dropdown Component -->
<div
  class="search-results-dropdown"
  style="
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: white;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    max-height: 400px;
    overflow-y: auto;
    z-index: 1000;
    margin-top: 0.5rem;
  "
>
  {% if suggestions %}
  <ul style="list-style: none; margin: 0; padding: 0">
    {% for item in suggestions %}
    <li>
      <a
        href="{% url 'products:product_detail' item.slug %}"
        style="
          display: flex;
          align-items: center;
          padding: 0.75rem 1rem;
          text-decoration: none;
          border-bottom: 1px solid var(--gray-100);
          transition: background 0.2s;
        "
        onmouseover="this.style.background = 'var(--gray-50)'"
        onmouseout="this.style.background = 'white'"
      >
        {% if item.image %}
        <img
          src="{{ item.image }}"
          alt="{{ item.name }}"
          style="
            width: 48px;
            height: 48px;
            border-radius: var(--radius);
            object-fit: cover;
            margin-right: 1rem;
            flex-shrink: 0;
          "
        />
        {% else %}
        <div
          style="
            width: 48px;
            height: 48px;
            border-radius: var(--radius);
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1rem;
            flex-shrink: 0;
            color: var(--gray-400);
          "
        >
          <i class="fas fa-image"></i>
        </div>
        {% endif %}
        <div style="flex: 1; min-width: 0">
          <div
            style="
              font-weight: 500;
              color: var(--gray-800);
              white-space: nowrap;
              overflow: hidden;
              text-overflow: ellipsis;
              margin-bottom: 0.25rem;
            "
          >
            {{ item.name }}
          </div>
          <div
            style="color: var(--primary); font-size: 0.875rem; font-weight: 600"
          >
            {{ site_settings.currency_symbol|default:"$" }}{{ item.price }}
          </div>
        </div>
        <i
          class="fas fa-arrow-right"
          style="
            color: var(--gray-400);
            margin-left: 0.75rem;
            font-size: 0.875rem;
          "
        ></i>
      </a>
    </li>
    {% endfor %}
  </ul>
  <div
    style="
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--gray-100);
      text-align: center;
    "
  >
    <a
      href="{% url 'products:search' %}?q={{ search_query }}"
      style="
        color: var(--primary);
        font-size: 0.875rem;
        text-decoration: none;
        font-weight: 500;
      "
    >
      View all results
      <i class="fas fa-arrow-right" style="margin-left: 0.25rem"></i>
    </a>
  </div>
  {% else %}
  <div style="padding: 2rem; text-align: center; color: var(--gray-500)">
    <i
      class="fas fa-search"
      style="font-size: 2rem; margin-bottom: 0.75rem; color: var(--gray-400)"
    ></i>
    <p style="margin: 0; font-size: 0.875rem">No products found</p>
  </div>
  {% endif %}
</div>
