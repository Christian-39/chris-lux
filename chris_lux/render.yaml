services:
  - type: web
    name: chris-lux
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn chris_lux.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,chris-lux.com,www.chris-lux.com"
      - key: DATABASE_URL
        fromDatabase:
          name: chris-lux-db
          property: connectionString

databases:
  - name: chris-lux-db
    databaseName: chris_lux
    user: chris_lux
    plan: free
